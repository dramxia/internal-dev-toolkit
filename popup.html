<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* ─────────────────────────────────────────
       TOKENS — fresh green / sage / mint system
    ───────────────────────────────────────── */
    :root {
      --sage-50:  #F2F7F2;
      --sage-100: #E4EFE3;
      --sage-200: #C5DCBF;
      --sage-300: #99C28F;
      --sage-400: #6DA661;
      --sage-500: #4A8C3F;
      --sage-600: #36712E;
      --sage-700: #275622;
      --mint-50:  #EDFBF6;
      --mint-100: #D0F5E7;
      --mint-300: #6DDCB0;
      --mint-400: #34C98A;

      --surface:  #FAFDF8;
      --panel:    #FFFFFF;
      --border:   #D6E8D2;
      --border-strong: #A8C9A0;

      --text-1:   #1A2E1A;
      --text-2:   #4B6B48;
      --text-3:   #7E9E7A;
      --text-inv: #FFFFFF;

      --success:  #22a861;
      --success-bg: rgba(34,168,97,.08);
      --error:    #e53e3e;
      --error-bg: rgba(229,62,62,.08);
      --warn:     #d97706;
      --warn-bg:  rgba(217,119,6,.08);

      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;

      --shadow-sm:  0 1px 4px rgba(36,80,36,.08);
      --shadow-md:  0 4px 16px rgba(36,80,36,.12);
      --shadow-lg:  0 8px 32px rgba(36,80,36,.16);

      --tab-h: 44px;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* 隐藏弹窗外层滚动条（内部 .list 的细滚动条不受影响） */
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { width: 0; height: 0; display: none; }

    body {
      width: 420px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--surface);
      color: var(--text-1);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ────────────────────────────────────────
       HEADER  — curved bottom, leaf decoration
    ──────────────────────────────────────── */
    .app-header {
      background: linear-gradient(145deg, var(--sage-600) 0%, var(--sage-500) 55%, var(--sage-400) 100%);
      padding: 18px 20px 52px;
      position: relative;
      overflow: hidden;
    }

    /* organic blob backdrop */
    .app-header::before {
      content: '';
      position: absolute;
      top: -30px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50% 60% 40% 70% / 50% 40% 60% 50%;
      background: rgba(255,255,255,.07);
      pointer-events: none;
    }
    .app-header::after {
      content: '';
      position: absolute;
      bottom: 10px; left: -20px;
      width: 120px; height: 90px;
      border-radius: 60% 40% 50% 50% / 40% 60% 50% 60%;
      background: rgba(255,255,255,.05);
      pointer-events: none;
    }

    /* wave divider at bottom of header */
    .header-wave {
      position: absolute;
      bottom: -1px; left: 0;
      width: 100%; height: 40px;
      fill: var(--surface);
    }

    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-ring {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 1.5px solid rgba(255,255,255,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      backdrop-filter: blur(6px);
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.4px;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,.65);
      margin-top: 2px;
    }

    /* ────────────────────────────────────────
       PROJECT PILLS  — floats over wave
    ──────────────────────────────────────── */
    .project-bar {
      margin: -28px 16px 0;
      position: relative;
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .project-bar-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-3);
      flex-shrink: 0;
    }

    .project-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }

    /* id=projectPills — JS target, class kept on inner wrapper */
    .project-pill {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--sage-50);
      color: var(--text-2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all .15s ease;
      white-space: nowrap;
    }
    .project-pill:hover {
      border-color: var(--sage-400);
      background: var(--sage-100);
      color: var(--sage-600);
    }
    .project-pill.active {
      background: var(--sage-500);
      border-color: var(--sage-500);
      color: #fff;
    }

    /* ────────────────────────────────────────
       TAB SWITCHER
    ──────────────────────────────────────── */
    .tab-rail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin: 16px 16px 0;
      background: var(--sage-100);
      border-radius: var(--radius-md);
      padding: 4px;
      position: relative;
      z-index: 5;
    }

    .tab-btn {
      height: var(--tab-h);
      border: none;
      border-radius: calc(var(--radius-md) - 4px);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .tab-btn .tab-icon { font-size: 16px; line-height: 1; }
    .tab-btn:hover { color: var(--sage-600); }
    .tab-btn.active {
      background: var(--panel);
      color: var(--sage-600);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    /* ────────────────────────────────────────
       PANELS
    ──────────────────────────────────────── */
    .panels {
      padding: 14px 16px 20px;
    }

    .panel {
      display: none;
      animation: panelFadeIn .2s ease;
    }
    .panel.active { display: block; }

    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ────────────────────────────────────────
       SECTION BLOCKS  (replace old .card)
    ──────────────────────────────────────── */
    .section-block {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .section-block:last-child { margin-bottom: 0; }

    .section-header {
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .section-header:hover { background: var(--sage-50); }

    .section-header-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .section-icon {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .section-icon.green  { background: var(--sage-100); }
    .section-icon.mint   { background: var(--mint-100); }

    .section-header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.2px;
    }

    .section-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chevron {
      width: 18px; height: 18px;
      color: var(--text-3);
      transition: transform .2s ease;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
    }
    .section-block.expanded .chevron { transform: rotate(180deg); }

    .collapsible-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s cubic-bezier(.4,0,.2,1);
    }
    .section-block.expanded .collapsible-body { max-height: 4000px; }

    .section-content {
      padding: 4px 16px 16px;
      border-top: 1px solid var(--border);
    }

    /* ────────────────────────────────────────
       FORM ELEMENTS
    ──────────────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
      margin-top: 14px;
    }

    .field-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--sage-50);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font-size: 13px;
      font-weight: 400;
      outline: none;
      transition: all .15s;
      font-family: inherit;
    }
    .field-input::placeholder { color: var(--text-3); }
    .field-input:focus {
      background: var(--panel);
      border-color: var(--sage-400);
      box-shadow: 0 0 0 3px rgba(106,166,97,.15);
    }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: var(--sage-500);
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    .pw-toggle:hover { color: var(--sage-700); }

    select.field-input { cursor: pointer; }

    /* ────────────────────────────────────────
       BUTTON ROW
    ──────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-row .btn { flex: 1; }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
      font-family: inherit;
      letter-spacing: -.1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--sage-500), var(--sage-600));
      color: #fff;
      box-shadow: 0 2px 8px rgba(54,113,46,.25);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--sage-600), var(--sage-700));
      box-shadow: 0 4px 14px rgba(54,113,46,.35);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: var(--sage-50);
      color: var(--text-2);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--sage-100);
      border-color: var(--sage-300);
      color: var(--sage-700);
    }

    .btn-danger {
      background: var(--error-bg);
      color: var(--error);
      border: 1.5px solid rgba(229,62,62,.2);
    }
    .btn-danger:hover:not(:disabled) {
      background: var(--error);
      color: #fff;
      border-color: var(--error);
    }

    /* full-width single btn */
    .btn-full { width: 100%; margin-top: 10px; }

    /* ────────────────────────────────────────
       FLOATING TOAST (统一提示，悬浮顶部，不占内容空间)
    ──────────────────────────────────────── */
    .toast {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      z-index: 1000;
      max-width: calc(100% - 24px);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      text-align: center;
      background: var(--panel);
      color: var(--text-2);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok  { background: var(--success-bg); color: var(--success); border-color: rgba(34,168,97,.25); }
    .toast.err { background: var(--error-bg);   color: var(--error);   border-color: rgba(229,62,62,.25); }

    /* ────────────────────────────────────────
       TOKEN BOX
    ──────────────────────────────────────── */
    .token-shell {
      margin-top: 10px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1.5px solid var(--border);
    }
    .token-shell-bar {
      background: var(--sage-100);
      padding: 7px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .token-shell-bar-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--sage-600);
    }
    .token-shell-bar-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }
    .token-shell-bar-dot.active {
      background: var(--success);
      box-shadow: 0 0 0 3px var(--success-bg);
    }

    .token-box {
      padding: 12px 14px;
      background: #1A2E1A;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: #6DDCB0;
      word-break: break-all;
      line-height: 1.7;
      min-height: 52px;
    }
    .token-box.empty {
      background: var(--sage-50);
      color: var(--text-3);
      font-family: inherit;
      font-size: 12px;
    }

    .token-meta {
      padding: 6px 14px;
      background: #111f11;
      font-size: 10px;
      color: rgba(109,220,176,.5);
      font-family: 'SF Mono', monospace;
    }
    .token-box.empty + .token-meta { display: none; }

    /* ────────────────────────────────────────
       HINT CALLOUT
    ──────────────────────────────────────── */
    .callout {
      margin-top: 14px;
      padding: 11px 14px;
      background: var(--mint-50);
      border: 1px solid var(--mint-100);
      border-left: 3px solid var(--mint-400);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 11.5px;
      line-height: 1.6;
      color: var(--text-2);
    }
    .callout code {
      background: var(--mint-100);
      color: var(--sage-700);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10.5px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    /* ────────────────────────────────────────
       DIVIDER
    ──────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ────────────────────────────────────────
       LISTS  (tenant / user)
    ──────────────────────────────────────── */
    .list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
      border-radius: var(--radius-sm);
      background: var(--sage-50);
      border: 1.5px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .list::-webkit-scrollbar { width: 5px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .list::-webkit-scrollbar-thumb:hover { background: var(--sage-300); }

    .list.hidden { display: none; }

    .list-item {
      padding: 10px 13px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .13s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: var(--sage-100); }
    .list-item.active {
      background: var(--sage-100);
      border-left: 3px solid var(--sage-400);
      padding-left: 10px;
    }

    .list-item-content { flex: 1; min-width: 0; }
    .list-item-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-item-meta { font-size: 10.5px; color: var(--text-3); }

    .list-item-role {
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--sage-100);
      color: var(--sage-600);
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
      margin-left: 5px;
    }

    .list-item-btn {
      padding: 6px 14px;
      background: var(--sage-500);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      font-family: inherit;
    }
    .list-item-btn:hover:not(:disabled) {
      background: var(--sage-600);
      transform: translateY(-1px);
    }
    .list-item-btn:disabled { opacity: .45; cursor: not-allowed; }

    .list-item-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .action-btn {
      width: 32px; height: 32px;
      background: var(--sage-50);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center;
    }
    .action-btn:hover:not(:disabled) {
      background: var(--sage-100);
      border-color: var(--sage-400);
      color: var(--sage-700);
    }
    .action-btn.primary {
      background: var(--sage-500);
      border-color: var(--sage-500);
      color: #fff;
    }
    .action-btn.primary:hover:not(:disabled) {
      background: var(--sage-600);
      border-color: var(--sage-600);
    }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; }

    .list-empty {
      padding: 28px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
    }
    .list-empty.hidden { display: none; }

    .load-more {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--sage-500);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .load-more:hover {
      background: var(--sage-50);
      border-color: var(--sage-400);
    }
    .load-more.hidden { display: none; }

    /* ────────────────────────────────────────
       RECENT LIST
    ──────────────────────────────────────── */
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .recent-item {
      padding: 9px 12px;
      background: var(--sage-50);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      transition: all .15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .recent-item:hover {
      background: var(--sage-100);
      border-color: var(--sage-300);
    }

    .recent-item-info { flex: 1; min-width: 0; }

    .recent-item-text {
      font-size: 12px;
      color: var(--text-1);
      font-weight: 500;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .recent-env-badge {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
      flex-shrink: 0;
    }
    .recent-env-badge.local  { background: var(--success-bg); color: var(--success); }
    .recent-env-badge.online { background: var(--sage-100);   color: var(--sage-600); }

    .recent-item-time { font-size: 10.5px; color: var(--text-3); }

    .recent-item-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .recent-action-btn {
      width: 28px; height: 28px;
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center;
    }
    .recent-action-btn:hover:not(:disabled) {
      background: var(--sage-100);
      border-color: var(--sage-400);
      color: var(--sage-700);
    }
    .recent-action-btn.danger { color: var(--error); }
    .recent-action-btn.danger:hover:not(:disabled) {
      background: var(--error-bg);
      border-color: var(--error);
    }
    .recent-action-btn:disabled { opacity: .4; cursor: not-allowed; }

    .recent-empty {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
    }

    /* ────────────────────────────────────────
       ENV BADGE
    ──────────────────────────────────────── */
    .badge {
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .badge.success { background: var(--success-bg); color: var(--success); }
    .badge.error   { background: var(--error-bg);   color: var(--error);   }
    .badge.warning { background: var(--warn-bg);     color: var(--warn);    }

    /* ────────────────────────────────────────
       FADE IN
    ──────────────────────────────────────── */
    .fade-in {
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 统一悬浮提示（不占内容空间） -->
  <div class="toast" id="globalToast"></div>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-ring">🛠️</div>
      <div class="header-text">
        <h1>内部开发工具箱</h1>
        <p>Internal Dev Toolkit</p>
      </div>
    </div>
    <!-- organic wave -->
    <svg class="header-wave" viewBox="0 0 420 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C70,10 210,32 420,12 L420,40 Z"/>
    </svg>
  </header>

  <!-- ═══════════ PROJECT BAR ═══════════ -->
  <div class="project-bar">
    <span class="project-bar-label">项目</span>
    <div class="project-pills" id="projectPills">
      <!-- JS renders pills here -->
    </div>
  </div>

  <!-- ═══════════ TAB RAIL ═══════════ -->
  <div class="tab-rail">
    <button class="tab-btn active" data-tab="admin">
      <span class="tab-icon">🔐</span>
      后台账号 &amp; Token
    </button>
    <button class="tab-btn" data-tab="quick">
      <span class="tab-icon">⚡</span>
      一键快捷登录
    </button>
  </div>

  <!-- ═══════════ PANELS ═══════════ -->
  <div class="panels">

    <!-- ── PANEL A : Admin ── -->
    <div class="panel active" id="panel-admin">

      <!-- Section: credentials + login -->
      <div class="section-block expanded" id="adminPanelSection">
        <div class="section-header" id="adminPanelHeader">
          <div class="section-header-left">
            <div class="section-icon green">🔑</div>
            <span class="section-header-title">登录凭证</span>
          </div>
          <div class="section-header-right">
            <div class="chevron">▼</div>
          </div>
        </div>
        <div class="collapsible-body" id="adminPanelBody">
          <div class="section-content">

            <label class="field-label">账号</label>
            <div class="field">
              <input class="field-input" id="account" type="text" autocomplete="off" placeholder="手机号 / 邮箱">
            </div>

            <label class="field-label">密码</label>
            <div class="field">
              <div class="pw-wrap">
                <input class="field-input" id="password" type="password" autocomplete="off" placeholder="输入密码">
                <span class="pw-toggle" id="pwdToggle">显示</span>
              </div>
            </div>

            <div class="btn-row">
              <button class="btn btn-ghost"   id="saveBtn">保存</button>
              <button class="btn btn-danger"  id="clearBtn">清除</button>
              <button class="btn btn-primary" id="apiLoginBtn">登录</button>
            </div>

          </div>
        </div>
      </div>

      <!-- Section: token viewer -->
      <div class="section-block expanded">
        <div class="section-header">
          <div class="section-header-left">
            <div class="section-icon mint">🔏</div>
            <span class="section-header-title">Access Token</span>
          </div>
          <!-- no toggle needed here, always open -->
        </div>
        <div class="section-content" style="border-top:1px solid var(--border)">

          <div class="token-shell" id="tokenWrap">
            <div class="token-shell-bar">
              <span class="token-shell-bar-label">JWT / Token</span>
              <span class="token-shell-bar-dot"></span>
            </div>
            <div class="token-box empty" id="tokenValue">尚未获取 · 请先登录</div>
            <div class="token-meta"    id="tokenUpdated"></div>
          </div>

          <button class="btn btn-ghost btn-full" id="copyTokenBtn" disabled>复制 Token</button>

          <div class="callout">
            💡 API 登录通过后台服务跨域请求接口，token 将自动注入到目标页面
            <code>window.__ADMIN_TOKEN__</code>
          </div>

        </div>
      </div>

    </div><!-- /panel-admin -->

    <!-- ── PANEL B : Quick Login ── -->
    <div class="panel" id="panel-quick">

      <div class="section-block expanded" id="quickLoginSection">
        <div class="section-header" id="quickLoginHeader">
          <div class="section-header-left">
            <div class="section-icon mint">⚡</div>
            <span class="section-header-title">一键快捷登录</span>
          </div>
          <div class="section-header-right">
            <span class="badge" id="envBadge">DEV</span>
            <div class="chevron">▼</div>
          </div>
        </div>

        <div class="collapsible-body" id="quickLoginBody">
          <div class="section-content">

            <label class="field-label">本地端口（可选）</label>
            <div class="field">
              <input class="field-input" id="localPort" type="text" autocomplete="off"
                placeholder="留空 → 线上环境 / 填写 → localhost:端口">
            </div>

            <div class="divider"></div>

            <label class="field-label">选择租户</label>
            <div class="field">
              <input class="field-input" id="tenantSearch" type="text" autocomplete="off"
                placeholder="搜索租户名称 / 域名 / 联系人">
              <div class="list hidden" id="tenantList"></div>
              <div class="list-empty hidden" id="tenantEmpty">未找到租户</div>
            </div>

            <!-- dept — kept hidden by JS, id preserved -->
            <div class="field" style="display:none;">
              <label class="field-label" style="margin-top:0">部门筛选</label>
              <select class="field-input" id="deptSelect">
                <option value="">全部部门</option>
              </select>
            </div>

            <label class="field-label">搜索用户</label>
            <div class="field">
              <input class="field-input" id="userSearch" type="text" autocomplete="off"
                placeholder="姓名 / 手机号">
            </div>

            <div class="list hidden" id="userList"></div>
            <div class="list-empty hidden" id="userEmpty">未找到用户</div>
            <button class="load-more hidden" id="loadMoreUsers">加载更多</button>

            <div class="divider"></div>

            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);margin-bottom:6px;">最近登录</div>
            <div class="recent-list" id="recentList">
              <div class="recent-empty">暂无最近登录记录</div>
            </div>

          </div>
        </div>
      </div>

    </div><!-- /panel-quick -->

  </div><!-- /panels -->

  <!-- tab 切换逻辑已移至 popup.js（MV3 CSP 禁止内联 <script>） -->
  <script src="popup.js"></script>
</body>
</html>
