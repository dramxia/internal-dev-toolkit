<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>接口 Mock</title>
  <link rel="stylesheet" href="vendor/prism-theme.min.css">
  <style>
    :root {
      /* 深色极简色板 */
      --bg: #0d1117;
      --bg-elev: #161b22;
      --bg-hover: rgba(255, 255, 255, 0.04);
      --bg-active: rgba(47, 129, 247, 0.12);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);

      --text: #e6edf3;
      --text-secondary: #7d8590;
      --text-tertiary: #4d5666;

      --accent: #2f81f7;
      --success: #3fb950;
      --error: #f85149;
      --warning: #d29922;

      --method-get: #3fb950;
      --method-post: #2f81f7;
      --method-put: #d29922;
      --method-delete: #f85149;

      --radius: 6px;
      --radius-sm: 4px;
      --sidebar-w: 300px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 布局 ===== */
    .app {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      display: flex;
      flex-direction: column;
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      min-height: 0;
    }

    .resizer {
      width: 4px;
      flex: 0 0 4px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
    }
    .resizer:hover, .resizer.dragging { background: var(--accent); }

    .main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 16px;
    }

    /* ===== 侧栏头 ===== */
    .sidebar-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }
    .header-actions { display: flex; gap: 4px; }

    .icon-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-color: var(--border);
    }

    /* ===== 请求列表 ===== */
    .request-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .request-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .request-item:hover { background: var(--bg-hover); }
    .request-item.active {
      background: var(--bg-active);
      border-left-color: var(--accent);
    }
    .request-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .request-method {
      display: inline-block;
      font-weight: 600;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .method-GET    { color: var(--method-get); background: rgba(63, 185, 80, 0.12); }
    .method-POST   { color: var(--method-post); background: rgba(47, 129, 247, 0.14); }
    .method-PUT    { color: var(--method-put); background: rgba(210, 153, 34, 0.14); }
    .method-DELETE { color: var(--method-delete); background: rgba(248, 81, 73, 0.14); }

    .request-url {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-tertiary);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--error); }

    .list-empty {
      padding: 24px 12px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    /* ===== 主区 / 空状态 ===== */
    .empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-tertiary);
    }
    .empty-state .empty-title { font-size: 14px; color: var(--text-secondary); }
    .empty-state .empty-hint { font-size: 12px; }

    /* ===== 编辑器 ===== */
    .editor {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 960px;
    }
    .section {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    /* 接口信息键值表 */
    .kv { display: flex; flex-direction: column; gap: 6px; }
    .kv-row { display: flex; gap: 12px; align-items: baseline; }
    .kv-key {
      width: 64px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .kv-val {
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }
    .kv-val.mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }

    /* Mock 模式单选 */
    .radio-group { display: flex; gap: 16px; flex-wrap: wrap; }
    .radio-label {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      font-size: 12px; color: var(--text);
    }
    .radio-label input { margin: 0; cursor: pointer; }

    /* 拦截开关 */
    .intercept-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .intercept-label { font-size: 12px; color: var(--text); }
    .switch { display: inline-flex; cursor: pointer; }
    .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .switch-track {
      width: 34px; height: 18px; border-radius: 9px;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--border);
      position: relative; transition: background 0.18s;
      display: inline-block;
    }
    .switch-thumb {
      position: absolute; top: 1px; left: 1px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #c9d1d9; transition: transform 0.18s, background 0.18s;
    }
    .switch input:checked + .switch-track { background: var(--accent); border-color: var(--accent); }
    .switch input:checked + .switch-track .switch-thumb { transform: translateX(16px); background: #fff; }

    /* 列表 Mock 标记 */
    .mocked-tag {
      font-size: 10px; padding: 0 4px; border-radius: 3px;
      background: rgba(47, 129, 247, 0.18); color: var(--accent);
      flex-shrink: 0; margin-left: 4px;
    }

    /* tab */
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .tab {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    textarea {
      width: 100%;
      min-height: 220px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }

    /* JSON 代码编辑器（CodeJar + Prism） */
    .json-editor-host {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: auto;
      max-height: 420px;
    }
    .json-editor-host:focus-within { border-color: var(--accent); }
    .json-editor-host pre.language-json {
      margin: 0;
      padding: 10px 12px;
      background: transparent !important;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      min-height: 220px;
      outline: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .json-editor-host code.language-json {
      display: block;
      outline: none;
      caret-color: var(--text);
    }

    .hint { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; }

    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 6px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #4493f8; }
    .btn-secondary {
      background: transparent;
      border-color: var(--border-strong);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--bg-hover); border-color: var(--accent); }

    .status-msg {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      margin-top: 10px;
      font-size: 12px;
      display: none;
    }
    .status-msg.show { display: block; }
    .status-msg.ok  { background: rgba(63, 185, 80, 0.1);  color: var(--success); }
    .status-msg.err { background: rgba(248, 81, 73, 0.1);  color: var(--error); }

    /* ===== 窄宽布局：侧栏折叠为顶部条 ===== */
    .app[data-layout="narrow"] {
      flex-direction: column;
    }
    .app[data-layout="narrow"] .sidebar {
      width: 100%;
      flex: 0 0 auto;
      max-height: 40%;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .app[data-layout="narrow"] .resizer { display: none; }
    .app[data-layout="narrow"] .main { padding: 12px; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); background-clip: content-box; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">接口列表</div>
        <div class="header-actions">
          <button class="icon-btn" id="refreshBtn" title="刷新">刷新</button>
          <button class="icon-btn" id="clearBtn" title="清空">清空</button>
        </div>
      </div>
      <div class="request-list" id="requestList">
        <!-- 动态渲染 -->
      </div>
    </aside>

    <div class="resizer" id="resizer"></div>

    <main class="main">
      <div id="content">
        <div class="empty-state">
          <div class="empty-title">暂无接口记录</div>
          <div class="empty-hint">在页面中发送网络请求后会显示在这里</div>
        </div>
      </div>
    </main>
  </div>

  <script src="vendor/prism-core.min.js"></script>
  <script src="vendor/prism-json.min.js"></script>
  <script src="vendor/codejar.min.js"></script>
  <script src="panel.js"></script>
</body>
</html>
