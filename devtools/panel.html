<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Mock Studio</title>
  <link rel="stylesheet" href="vendor/prism-theme.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

    :root {
      /* ── Core palette ── */
      --bg:           #1a1d21;
      --bg-sidebar:   #13151a;
      --bg-panel:     #1e2128;
      --bg-hover:     #272b33;
      --bg-active:    #2c3140;
      --bg-input:     #161820;

      --border:       #2e333d;
      --border-focus: #4a90d9;
      --border-subtle:#252830;

      --text-primary: #e2e6ed;
      --text-secondary:#8b92a0;
      --text-tertiary: #555d6b;
      --text-inv:     #ffffff;
      --text-code:    #abb2bf;

      /* ── Method colors (muted, professional) ── */
      --get:          #4ec9b0;
      --get-bg:       rgba(78,201,176,.1);
      --post:         #569cd6;
      --post-bg:      rgba(86,156,214,.1);
      --put:          #dcdcaa;
      --put-bg:       rgba(220,220,170,.1);
      --delete:       #f48771;
      --delete-bg:    rgba(244,135,113,.1);
      --patch:        #c586c0;
      --patch-bg:     rgba(197,134,192,.1);

      /* ── Semantic ── */
      --success:      #4ec9b0;
      --success-bg:   rgba(78,201,176,.08);
      --error:        #f48771;
      --error-bg:     rgba(244,135,113,.08);
      --warn:         #dcdcaa;
      --warn-bg:      rgba(220,220,170,.08);
      --accent:       #4a90d9;
      --accent-bg:    rgba(74,144,217,.12);

      /* ── Code editor ── */
      --code-bg:      #0d1117;
      --code-gutter:  #161b22;
      --code-border:  #30363d;

      /* ── Geometry ── */
      --radius-xs:    3px;
      --radius-sm:    4px;
      --radius-md:    6px;
      --radius-lg:    8px;

      /* ── Shadow ── */
      --shadow-sm:    0 1px 3px rgba(0,0,0,.4);
      --shadow-md:    0 4px 12px rgba(0,0,0,.5);

      /* ── Layout ── */
      --sidebar-w:    300px;
      --toolbar-h:    40px;

      /* ── Font ── */
      --font-ui:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:    'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 12px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ────────────────────────────────────────
       APP SHELL
    ──────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 4px 1fr;
      grid-template-rows: var(--toolbar-h) 1fr;
      height: 100vh;
    }

    /* ────────────────────────────────────────
       TOOLBAR
    ──────────────────────────────────────── */
    .toolbar {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      align-items: center;
      gap: 0;
      height: var(--toolbar-h);
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      gap: 8px;
    }
    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .toolbar-brand-icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-xs);
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
    }
    .toolbar-brand-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 4px;
    }
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .toolbar-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-focus);
    }
    .toolbar-btn:active { opacity: 0.8; }
    .toolbar-btn svg { flex-shrink: 0; }

    /* ────────────────────────────────────────
       SIDEBAR
    ──────────────────────────────────────── */
    .sidebar {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow: hidden;
      min-height: 0;
    }
    .sidebar-label {
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .request-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 4px 0;
    }

    /* ────────────────────────────────────────
       REQUEST ITEMS
    ──────────────────────────────────────── */
    .request-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 7px 12px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .request-item:hover {
      background: var(--bg-hover);
    }
    .request-item.active {
      background: var(--bg-active);
      border-left-color: var(--accent);
    }
    .request-row {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .request-method {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 18px;
      padding: 0 5px;
      border-radius: var(--radius-xs);
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .method-GET    { color: var(--get);    background: var(--get-bg);    }
    .method-POST   { color: var(--post);   background: var(--post-bg);   }
    .method-PUT    { color: var(--put);    background: var(--put-bg);    }
    .method-DELETE { color: var(--delete); background: var(--delete-bg); }
    .method-PATCH  { color: var(--patch);  background: var(--patch-bg);  }

    .request-url {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      flex-shrink: 0;
    }
    .status-dot.ok  { background: var(--success); }
    .status-dot.err { background: var(--error); }

    .mocked-tag {
      display: inline-flex;
      align-items: center;
      height: 14px;
      padding: 0 5px;
      border-radius: 2px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 9px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .list-empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 11px;
      line-height: 1.7;
    }

    /* ────────────────────────────────────────
       RESIZER
    ──────────────────────────────────────── */
    .resizer {
      grid-column: 2;
      grid-row: 2;
      cursor: col-resize;
      background: var(--border);
      transition: background 0.15s;
      position: relative;
    }
    .resizer::after {
      content: '';
      position: absolute;
      inset: 0 -3px;
    }
    .resizer:hover,
    .resizer.dragging {
      background: var(--border-focus);
    }

    /* ────────────────────────────────────────
       MAIN CONTENT
    ──────────────────────────────────────── */
    .main {
      grid-column: 3;
      grid-row: 2;
      overflow-y: auto;
      background: var(--bg);
      min-width: 0;
    }
    #content { min-height: 100%; }

    /* ────────────────────────────────────────
       EMPTY STATE  ·  bioluminescent deep-field
       sage/mint palette · dark adaptation
    ──────────────────────────────────────── */

    :root {
      --sage-400:       #6DA661;
      --sage-500:       #4A8C3F;
      --mint-300:       #6DDCB0;
      --mint-400:       #34C98A;
      --es-mint-glow:   rgba(52, 201, 138, 0.18);
      --es-mint-stroke: rgba(52, 201, 138, 0.42);
      --es-mint-bright: #34C98A;
      --es-sage-text:   #6DDCB0;
    }


    .empty-state {
      height: 100%;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 48px 32px;
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }


    .empty-state::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 180px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      border-radius: 62% 38% 55% 45% / 48% 54% 46% 52%;
      background: radial-gradient(ellipse at 45% 40%,
        rgba(52, 201, 138, 0.11) 0%,
        rgba(109, 218, 176, 0.05) 55%,
        transparent 80%);
      filter: blur(28px);
      pointer-events: none;
      animation: es-blob-morph 9s ease-in-out infinite alternate;
    }


    .empty-state::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 100px;
      top: 38%;
      left: 58%;
      transform: translate(-50%, -50%);
      border-radius: 45% 55% 38% 62% / 55% 42% 58% 45%;
      background: radial-gradient(ellipse at 55% 55%,
        rgba(74, 140, 63, 0.08) 0%,
        transparent 72%);
      filter: blur(20px);
      pointer-events: none;
      animation: es-blob-morph 13s ease-in-out infinite alternate-reverse;
    }

    @keyframes es-blob-morph {
      0%   { border-radius: 62% 38% 55% 45% / 48% 54% 46% 52%; }
      33%  { border-radius: 50% 50% 40% 60% / 60% 40% 55% 45%; }
      66%  { border-radius: 38% 62% 52% 48% / 45% 55% 48% 52%; }
      100% { border-radius: 55% 45% 60% 40% / 52% 48% 45% 55%; }
    }


    .es-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .es-p {
      position: absolute;
      border-radius: 50%;
      background: var(--es-mint-bright);
      opacity: 0;
      animation: es-float linear infinite;
    }
    .es-p:nth-child(1)  { width:3px; height:3px; left:22%; animation-duration:6.8s; animation-delay:0s;    }
    .es-p:nth-child(2)  { width:2px; height:2px; left:38%; animation-duration:8.2s; animation-delay:1.4s;  }
    .es-p:nth-child(3)  { width:4px; height:4px; left:55%; animation-duration:7.4s; animation-delay:0.7s;  }
    .es-p:nth-child(4)  { width:2px; height:2px; left:70%; animation-duration:9.1s; animation-delay:2.1s;  }
    .es-p:nth-child(5)  { width:3px; height:3px; left:15%; animation-duration:6.3s; animation-delay:3.5s;  }
    .es-p:nth-child(6)  { width:2px; height:2px; left:80%; animation-duration:7.9s; animation-delay:0.3s;  }
    .es-p:nth-child(7)  { width:3px; height:3px; left:47%; animation-duration:8.6s; animation-delay:4.2s;  }
    .es-p:nth-child(8)  { width:2px; height:2px; left:63%; animation-duration:5.9s; animation-delay:1.8s;  }
    @keyframes es-float {
      0%   { bottom: -10px; opacity: 0;    transform: translateX(0); }
      15%  {                opacity: 0.55; }
      80%  {                opacity: 0.3;  }
      100% { bottom: 110%;  opacity: 0;    transform: translateX(18px); }
    }


    .empty-state-icon {
      position: relative;
      z-index: 1;
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }


    .empty-state-icon::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 42% 58% 54% 46% / 50% 44% 56% 50%;
      background: rgba(52, 201, 138, 0.06);
      border: 1px solid rgba(52, 201, 138, 0.14);
      animation: es-blob-morph 7s ease-in-out infinite alternate,
                 es-pulse 4s ease-in-out infinite;
    }
    @keyframes es-pulse {
      0%, 100% { box-shadow: 0 0 0   0   rgba(52,201,138,0);    }
      50%       { box-shadow: 0 0 22px 4px rgba(52,201,138,0.12); }
    }


    .empty-state-icon svg {
      position: relative;
      z-index: 1;
      color: var(--es-mint-stroke);
      filter: drop-shadow(0 0 5px rgba(52, 201, 138, 0.28));
      animation: es-breathe 4s ease-in-out infinite;
    }
    @keyframes es-breathe {
      0%, 100% { opacity: 0.75; transform: scale(1);    }
      50%       { opacity: 1;   transform: scale(1.07); }
    }


    .empty-title {
      position: relative;
      z-index: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--es-mint-bright);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-shadow: 0 0 12px rgba(52,201,138,0.35);
    }
    .empty-hint {
      position: relative;
      z-index: 1;
      font-size: 11px;
      color: var(--es-sage-text);
      text-align: center;
      max-width: 180px;
      line-height: 1.9;
      opacity: 0.48;
    }

    /* ────────────────────────────────────────
       EDITOR LAYOUT
    ──────────────────────────────────────── */
    .editor {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 1px;
      background: var(--border);
      height: 100%;
      min-height: 0;
    }

    /* ── Endpoint header (full width) ── */
    .editor-header {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .editor-header-method {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      height: 24px;
      padding: 0 8px;
      border-radius: var(--radius-xs);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .editor-header-url {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: var(--radius-xs);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      background: var(--bg-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .badge.ok    { background: var(--success-bg); color: var(--success);  border-color: rgba(78,201,176,.2); }
    .badge.err   { background: var(--error-bg);   color: var(--error);    border-color: rgba(244,135,113,.2); }
    .badge.mocked { background: var(--accent-bg); color: var(--accent);   border-color: rgba(74,144,217,.2); }

    /* ── Left config column ── */
    .config-col {
      grid-column: 1;
      grid-row: 2;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      min-height: 0;
    }

    /* ── Right data column ── */
    .data-col {
      grid-column: 2;
      grid-row: 2;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Action row (full width) ── */
    .action-dock {
      grid-column: 1 / -1;
      grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 14px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
    }

    /* ────────────────────────────────────────
       SECTION (inside config col)
    ──────────────────────────────────────── */
    .section {
      border-bottom: 1px solid var(--border-subtle);
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border-subtle);
    }
    .section-body {
      padding: 10px 12px;
    }

    /* ── Key-Value table ── */
    .kv {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .kv-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 8px;
      align-items: start;
      padding: 5px 0;
    }
    .kv-key {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      padding-top: 1px;
    }
    .kv-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-primary);
      word-break: break-all;
      line-height: 1.5;
    }

    /* ── Intercept toggle ── */
    .intercept-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .intercept-label {
      font-size: 12px;
      color: var(--text-secondary);
      flex: 1;
    }

    .switch { display: inline-flex; cursor: pointer; flex-shrink: 0; }
    .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .switch-track {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      transition: background 0.15s, border-color 0.15s;
    }
    .switch-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-tertiary);
      transition: transform 0.15s, background 0.15s;
    }
    .switch input:checked + .switch-track {
      background: var(--accent);
      border-color: var(--accent);
    }
    .switch input:checked + .switch-track .switch-thumb {
      transform: translateX(16px);
      background: #fff;
    }

    /* ── Radio group ── */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 11px;
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
    }
    .radio-label:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .radio-label input {
      width: 14px;
      height: 14px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    /* ────────────────────────────────────────
       DATA COLUMN — TABS + EDITOR
    ──────────────────────────────────────── */
    .data-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      height: 34px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      height: 100%;
      padding: 0 14px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }

    /* ── JSON code frame ── */
    .json-frame {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .json-frame.has-lint-error .json-editor-host {
      box-shadow: inset 0 0 0 1px rgba(244,135,113,.35);
    }
    .json-frame-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 30px;
      padding: 0 12px;
      background: var(--code-gutter);
      border-bottom: 1px solid var(--code-border);
      flex-shrink: 0;
    }
    .json-frame-title {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
    }
    .json-window-dots {
      display: flex;
      gap: 5px;
    }
    .json-window-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
    }

    .json-editor-host {
      flex: 1;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: stretch;
      overflow: auto;
      background: var(--code-bg);
      min-height: 200px;
    }
    .json-editor-gutter {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 44px;
      padding: 14px 6px 14px 6px;
      border-right: 1px solid var(--code-border);
      background: var(--code-gutter);
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.7;
      user-select: none;
    }
    .json-gutter-line {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 3px;
      height: calc(11px * 1.7);
      align-items: center;
    }
    .json-gutter-line.is-fold-hidden { display: none; }
    .json-fold-btn {
      width: 12px;
      height: 12px;
      padding: 0;
      border: 0;
      border-radius: 2px;
      background: transparent;
      color: var(--text-tertiary);
      font: inherit;
      font-size: 9px;
      line-height: 12px;
      cursor: pointer;
    }
    .json-fold-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .json-line-no {
      text-align: right;
      font-variant-numeric: tabular-nums;
      opacity: 0.5;
    }
    .json-code-scroller { min-width: 0; }
    .json-editor-host pre.language-json {
      margin: 0;
      min-height: 200px;
      padding: 14px 16px;
      background: transparent !important;
      outline: none;
      white-space: pre;
      word-break: normal;
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.7;
    }
    .json-editor-host code.language-json {
      display: block;
      outline: none;
      caret-color: var(--accent);
    }
    .json-code-line {
      display: block;
      height: calc(11px * 1.7);
      min-height: calc(11px * 1.7);
      overflow: hidden;
      white-space: pre;
    }
    .json-code-line.is-fold-hidden { display: none; }
    .json-code-line.is-fold-start::after {
      content: attr(data-fold-label);
      display: inline-block;
      margin-left: 8px;
      padding: 0 6px;
      border-radius: 2px;
      background: var(--bg-hover);
      color: var(--text-tertiary);
      font-size: 10px;
    }

    /* Prism token colors (VS Code Dark+) */
    .json-editor-host .token.property   { color: #9cdcfe; }
    .json-editor-host .token.string     { color: #ce9178; }
    .json-editor-host .token.number     { color: #b5cea8; }
    .json-editor-host .token.boolean    { color: #569cd6; }
    .json-editor-host .token.null       { color: #569cd6; }
    .json-editor-host .token.punctuation { color: #808080; }

    /* ── Lint status bar ── */
    .json-lint-status {
      height: 24px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      border-top: 1px solid var(--code-border);
      background: var(--code-gutter);
      flex-shrink: 0;
    }
    .json-lint-status.ok  { color: var(--success); }
    .json-lint-status.err { color: var(--error); }

    /* ── Hint line below editor ── */
    .hint {
      padding: 7px 12px;
      font-size: 10px;
      color: var(--text-tertiary);
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    /* ────────────────────────────────────────
       ACTION DOCK
    ──────────────────────────────────────── */
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .btn:active:not(:disabled) { opacity: 0.75; }
    .btn-secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover {
      background: #5a9ee8;
    }

    /* ── Status message ── */
    .status-msg {
      display: none;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
    }
    .status-msg.show { display: inline-flex; }
    .status-msg.ok  { background: var(--success-bg); color: var(--success); }
    .status-msg.err { background: var(--error-bg);   color: var(--error); }

    /* ────────────────────────────────────────
       NARROW LAYOUT
    ──────────────────────────────────────── */
    .app[data-layout="narrow"] {
      grid-template-columns: 1fr;
      grid-template-rows: var(--toolbar-h) auto 1fr;
      overflow-y: auto;
      height: auto;
      min-height: 100vh;
    }
    .app[data-layout="narrow"] .sidebar {
      grid-column: 1;
      grid-row: 2;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 40vh;
    }
    .app[data-layout="narrow"] .resizer { display: none; }
    .app[data-layout="narrow"] .main {
      grid-column: 1;
      grid-row: 3;
    }
    .app[data-layout="narrow"] .editor {
      grid-template-columns: 1fr;
    }
    .app[data-layout="narrow"] .config-col {
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    /* ────────────────────────────────────────
       SCROLLBARS
    ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); background-clip: content-box; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Toolbar (full width) -->
    <div class="toolbar">
      <div class="toolbar-brand">
        <div class="toolbar-brand-icon">M</div>
        <span class="toolbar-brand-name">API Mock Studio</span>
      </div>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="refreshBtn" title="刷新请求列表">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.5 6A4.5 4.5 0 1 1 6 1.5c1.3 0 2.48.55 3.33 1.42L10.5 4.2"/>
          <path d="M10.5 1.5v3h-3"/>
        </svg>
        刷新
      </button>
      <button class="toolbar-btn" id="clearBtn" title="清空记录">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <polyline points="2,3 10,3"/>
          <path d="M4.5 3V2h3v1M5 6v3.5M7 6v3.5M3.5 3l.5 7h5l.5-7"/>
        </svg>
        清空
      </button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-label">Requests</div>
      <div class="request-list" id="requestList">
        <!-- dynamic -->
      </div>
    </aside>

    <!-- Resizer -->
    <div class="resizer" id="resizer"></div>

    <!-- Main -->
    <main class="main">
      <div id="content">
        <div class="empty-state">
          <div class="es-particles">
            <span class="es-p"></span>
            <span class="es-p"></span>
            <span class="es-p"></span>
            <span class="es-p"></span>
            <span class="es-p"></span>
            <span class="es-p"></span>
            <span class="es-p"></span>
            <span class="es-p"></span>
          </div>
          <div class="empty-state-icon">
            <svg width="30" height="30" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 18c2.7-2.7 6.3-4 10-4s7.3 1.3 10 4"/>
              <path d="M8.5 22c1.5-1.5 3.5-2.2 5.5-2.2s4 .7 5.5 2.2"/>
              <circle cx="14" cy="25" r="1.2" fill="currentColor" stroke="none"/>
              <path d="M1 14C5 10 9.3 8 14 8s9 2 13 6" opacity="0.4"/>
            </svg>
          </div>
          <div class="empty-title">暂无请求</div>
          <div class="empty-hint">在页面中发起网络请求<br>捕获后将呈现于此</div>
        </div>
      </div>
    </main>
  </div>

  <script src="vendor/prism-core.min.js"></script>
  <script src="vendor/prism-json.min.js"></script>
  <script src="vendor/codejar.min.js"></script>
  <script src="panel.js"></script>
</body>
</html>
