<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>接口 Mock</title>
  <link rel="stylesheet" href="vendor/prism-theme.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      /* 与工具面板同源的 sage / mint 系统，并扩展为更精致的工作台视觉 */
      --sage-50:  #F2F7F2;
      --sage-100: #E4EFE3;
      --sage-200: #C5DCBF;
      --sage-300: #99C28F;
      --sage-400: #6DA661;
      --sage-500: #4A8C3F;
      --sage-600: #36712E;
      --sage-700: #275622;
      --mint-50:  #EDFBF6;
      --mint-100: #D0F5E7;
      --mint-300: #6DDCB0;
      --mint-400: #34C98A;

      --surface:  #FAFDF8;
      --surface-2:#F6FBF3;
      --panel:    #FFFFFF;
      --panel-soft: rgba(255,255,255,.78);
      --border:   #D6E8D2;
      --border-strong: #A8C9A0;

      --ink:      #132413;
      --text-1:   #1A2E1A;
      --text-2:   #4B6B48;
      --text-3:   #7E9E7A;
      --text-inv: #FFFFFF;

      --success:  #22a861;
      --success-bg: rgba(34,168,97,.1);
      --error:    #e53e3e;
      --error-bg: rgba(229,62,62,.1);
      --warn:     #d97706;
      --warn-bg:  rgba(217,119,6,.1);

      --code-bg:  #102410;
      --code-bg-2:#172F17;
      --code-line:#244724;

      --radius-xs:  6px;
      --radius-sm:  10px;
      --radius-md:  16px;
      --radius-lg:  24px;
      --radius-xl:  32px;

      --shadow-xs: 0 1px 2px rgba(36,80,36,.06);
      --shadow-sm: 0 4px 14px rgba(36,80,36,.09);
      --shadow-md: 0 12px 36px rgba(36,80,36,.14);
      --shadow-lg: 0 24px 70px rgba(36,80,36,.18);

      --sidebar-w: 340px;

      /* 兼容原选择器命名，避免影响业务 JS */
      --bg: var(--surface);
      --bg-elev: var(--panel);
      --bg-hover: var(--sage-50);
      --bg-active: var(--sage-100);
      --text: var(--text-1);
      --text-secondary: var(--text-2);
      --text-tertiary: var(--text-3);
      --accent: var(--sage-500);
      --warning: var(--warn);
      --radius: var(--radius-md);

      --method-get: var(--success);
      --method-post: var(--sage-500);
      --method-put: var(--warn);
      --method-delete: var(--error);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 8% 0%, rgba(208,245,231,.72), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(197,220,191,.7), transparent 30%),
        radial-gradient(circle at 64% 88%, rgba(242,247,242,.95), transparent 42%),
        linear-gradient(135deg, #FBFEF8 0%, #F4FAEF 44%, #EEF8EF 100%);
      color: var(--text-1);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ===== 工作台总布局 ===== */
    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-w) 8px minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      padding: 18px;
      gap: 12px;
      isolation: isolate;
    }
    .app::before {
      content: '';
      position: absolute;
      inset: 18px 18px auto 18px;
      height: 138px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(54,113,46,.96), rgba(74,140,63,.88) 48%, rgba(52,201,138,.72)),
        var(--sage-600);
      box-shadow: var(--shadow-lg);
      z-index: -2;
    }
    .app::after {
      content: '';
      position: absolute;
      top: -90px;
      right: -74px;
      width: 280px;
      height: 280px;
      border-radius: 45% 55% 48% 52% / 42% 46% 54% 58%;
      background: rgba(255,255,255,.14);
      z-index: -1;
      pointer-events: none;
    }

    .sidebar {
      grid-column: 1;
      width: var(--sidebar-w);
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.62);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,.78);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
    }

    .resizer {
      grid-column: 2;
      align-self: stretch;
      width: 8px;
      cursor: col-resize;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.45), rgba(214,232,210,.65));
      border: 1px solid rgba(255,255,255,.55);
      transition: background .15s, transform .15s, box-shadow .15s;
      box-shadow: var(--shadow-xs);
    }
    .resizer:hover,
    .resizer.dragging {
      background: linear-gradient(180deg, var(--mint-100), var(--sage-200));
      transform: scaleX(1.35);
      box-shadow: 0 0 0 4px rgba(208,245,231,.45);
    }

    .main {
      grid-column: 3;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      padding: 132px 2px 8px;
    }
    #content { min-height: 100%; }

    /* ===== 左侧接口雷达 ===== */
    .sidebar-header {
      position: relative;
      min-height: 150px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      color: #fff;
      background:
        radial-gradient(circle at 90% 5%, rgba(255,255,255,.24), transparent 36%),
        linear-gradient(145deg, rgba(39,86,34,.98), rgba(74,140,63,.94) 58%, rgba(52,201,138,.78));
      overflow: hidden;
    }
    .sidebar-header::before {
      content: '';
      position: absolute;
      right: -46px;
      bottom: -70px;
      width: 170px;
      height: 170px;
      border-radius: 54% 46% 42% 58% / 54% 44% 56% 46%;
      background: rgba(255,255,255,.1);
    }
    .sidebar-header::after {
      content: 'API';
      position: absolute;
      right: 14px;
      bottom: -10px;
      color: rgba(255,255,255,.08);
      font-size: 74px;
      font-weight: 800;
      letter-spacing: -.08em;
      line-height: 1;
    }
    .sidebar-title {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0;
      color: transparent;
    }
    .sidebar-title::before {
      content: '接口 Mock Studio';
      width: fit-content;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      color: rgba(255,255,255,.86);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    .sidebar-title::after {
      content: 'Live Capture';
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.06em;
      line-height: 1.05;
    }
    .header-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .icon-btn {
      min-height: 34px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.28);
      color: #fff;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      transition: background .15s, border-color .15s, transform .15s, box-shadow .15s;
      backdrop-filter: blur(8px);
    }
    .icon-btn:hover {
      background: rgba(255,255,255,.26);
      border-color: rgba(255,255,255,.48);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(20,70,20,.12);
    }
    .icon-btn:active { transform: scale(.97); }

    .request-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.9), rgba(250,253,248,.96));
    }

    .request-item {
      position: relative;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 1px solid rgba(214,232,210,.78);
      border-radius: var(--radius-md);
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(246,251,243,.86));
      box-shadow: var(--shadow-xs);
      overflow: hidden;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    .request-item::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: transparent;
      transition: background .16s;
    }
    .request-item:hover {
      transform: translateY(-1px);
      border-color: var(--sage-300);
      box-shadow: var(--shadow-sm);
    }
    .request-item.active {
      background:
        linear-gradient(145deg, rgba(228,239,227,.98), rgba(237,251,246,.92));
      border-color: var(--sage-400);
      box-shadow: var(--shadow-md);
    }
    .request-item.active::before { background: linear-gradient(180deg, var(--mint-400), var(--sage-500)); }
    .request-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }
    .request-method {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .06em;
      box-shadow: inset 0 0 0 1px currentColor;
    }
    .method-GET    { color: var(--method-get);    background: var(--success-bg); }
    .method-POST   { color: var(--method-post);   background: var(--sage-100); }
    .method-PUT    { color: var(--method-put);    background: var(--warn-bg); }
    .method-DELETE { color: var(--method-delete); background: var(--error-bg); }

    .request-url {
      min-width: 0;
      color: var(--text-1);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
      color: var(--text-3);
      font-size: 11px;
    }
    .request-meta span:not(.status-dot) {
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(242,247,242,.9);
      border: 1px solid rgba(214,232,210,.8);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }
    .status-dot.ok {
      background: var(--success);
      box-shadow: 0 0 0 4px var(--success-bg);
    }
    .status-dot.err {
      background: var(--error);
      box-shadow: 0 0 0 4px var(--error-bg);
    }

    .mocked-tag {
      padding: 3px 7px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--mint-100), var(--sage-100));
      color: var(--sage-700);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .04em;
      flex-shrink: 0;
      border: 1px solid rgba(153,194,143,.45);
    }

    .list-empty {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      text-align: center;
      color: var(--text-3);
      font-size: 12px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      background: rgba(242,247,242,.64);
    }

    /* ===== 空状态 ===== */
    .empty-state {
      min-height: calc(100vh - 176px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 38px;
      border: 1px solid rgba(255,255,255,.74);
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at 50% 0%, rgba(208,245,231,.7), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(250,253,248,.84));
      box-shadow: var(--shadow-md);
      color: var(--text-3);
      backdrop-filter: blur(18px);
    }
    .empty-state::before {
      content: '⌁';
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: 26px;
      color: var(--sage-600);
      font-size: 44px;
      font-weight: 800;
      background: linear-gradient(145deg, var(--mint-100), var(--sage-100));
      box-shadow: var(--shadow-sm);
    }
    .empty-state .empty-title {
      color: var(--text-1);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.04em;
    }
    .empty-state .empty-hint { font-size: 13px; }

    /* ===== 右侧 Mock 工作台 ===== */
    .editor {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(290px, .78fr) minmax(420px, 1.22fr);
      gap: 14px;
      align-items: start;
    }
    .editor-hero,
    .section,
    .action-dock {
      border: 1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.82);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
    }
    .editor-hero {
      grid-column: 1 / -1;
      position: relative;
      padding: 20px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      color: #fff;
      background:
        radial-gradient(circle at 88% 12%, rgba(255,255,255,.24), transparent 30%),
        linear-gradient(135deg, rgba(26,46,26,.98), rgba(54,113,46,.94) 54%, rgba(52,201,138,.72));
    }
    .editor-hero::after {
      content: '';
      position: absolute;
      right: -56px;
      top: -70px;
      width: 220px;
      height: 220px;
      border-radius: 55% 45% 48% 52% / 44% 55% 45% 56%;
      background: rgba(255,255,255,.1);
      pointer-events: none;
    }
    .hero-kicker {
      width: fit-content;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.13);
      color: rgba(255,255,255,.78);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    .hero-main {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .hero-method {
      min-width: 72px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.28);
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: .06em;
      backdrop-filter: blur(10px);
    }
    .hero-copy { min-width: 0; flex: 1; }
    .hero-url {
      margin: 0;
      color: #fff;
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.16;
      letter-spacing: -.06em;
      word-break: break-all;
    }
    .hero-subline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .hero-pill {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.13);
      color: rgba(255,255,255,.84);
      font-size: 11px;
      font-weight: 700;
    }

    .config-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .data-panel { min-width: 0; }

    .section {
      position: relative;
      border-radius: var(--radius-lg);
      padding: 16px;
      overflow: hidden;
    }
    .section::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--mint-400), var(--sage-400), transparent);
      opacity: .78;
    }
    .section-title {
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text-1);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .section-title::before {
      content: '';
      width: 28px;
      height: 28px;
      border-radius: 11px;
      background:
        radial-gradient(circle at 36% 30%, #fff 0 16%, transparent 17%),
        linear-gradient(145deg, var(--mint-100), var(--sage-100));
      box-shadow: inset 0 0 0 1px rgba(153,194,143,.35), var(--shadow-xs);
      flex-shrink: 0;
    }
    .section-header-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-header-line .section-title { margin-bottom: 0; }

    .kv {
      display: grid;
      gap: 10px;
    }
    .kv-row {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 10px 11px;
      border-radius: var(--radius-sm);
      background: rgba(242,247,242,.68);
      border: 1px solid rgba(214,232,210,.7);
    }
    .kv-key {
      color: var(--text-3);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .kv-val {
      min-width: 0;
      color: var(--text-1);
      font-size: 12px;
      font-weight: 600;
      word-break: break-all;
    }
    .kv-val.mono { font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }

    .intercept-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(208,245,231,.98);
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.9), transparent 28%),
        linear-gradient(135deg, var(--mint-50), rgba(242,247,242,.92));
    }
    .intercept-label {
      color: var(--text-2);
      font-size: 13px;
      font-weight: 700;
    }
    .switch { display: inline-flex; cursor: pointer; flex-shrink: 0; }
    .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .switch-track {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--sage-100);
      transition: background .18s, border-color .18s, box-shadow .18s;
    }
    .switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 8px rgba(26,46,26,.22);
      transition: transform .18s, background .18s;
    }
    .switch input:checked + .switch-track {
      background: linear-gradient(135deg, var(--sage-500), var(--mint-400));
      border-color: transparent;
      box-shadow: 0 0 0 5px rgba(52,201,138,.12);
    }
    .switch input:checked + .switch-track .switch-thumb { transform: translateX(20px); }

    .radio-group {
      display: grid;
      gap: 10px;
    }
    .radio-label {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 10px 12px;
      cursor: pointer;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(214,232,210,.78);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.7);
      transition: transform .15s, border-color .15s, background .15s, box-shadow .15s;
    }
    .radio-label:hover {
      transform: translateY(-1px);
      border-color: var(--sage-300);
      background: var(--sage-50);
      box-shadow: var(--shadow-sm);
    }
    .radio-label input {
      width: 16px;
      height: 16px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--sage-500);
    }

    .tabs {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: var(--sage-100);
      box-shadow: inset 0 0 0 1px rgba(168,201,160,.28);
    }
    .tab {
      min-width: 84px;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      transition: background .15s, color .15s, box-shadow .15s, transform .15s;
    }
    .tab:hover { color: var(--sage-700); }
    .tab.active {
      color: var(--sage-700);
      background: #fff;
      box-shadow: var(--shadow-sm);
    }

    .json-frame {
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(36,71,36,.8);
      background: var(--code-bg);
      box-shadow: 0 18px 46px rgba(16,36,16,.22);
    }
    .json-frame-bar {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      background: linear-gradient(180deg, var(--code-bg-2), var(--code-bg));
      border-bottom: 1px solid rgba(109,220,176,.12);
    }
    .json-window-dots { display: flex; gap: 6px; }
    .json-window-dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--mint-300);
      opacity: .75;
    }
    .json-window-dots span:nth-child(2) { background: var(--sage-300); }
    .json-window-dots span:nth-child(3) { background: var(--warn); }
    .json-frame-title {
      color: rgba(208,245,231,.68);
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 11px;
    }
    .json-editor-host {
      max-height: min(58vh, 560px);
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--code-bg);
    }
    .json-editor-host:focus-within { box-shadow: inset 0 0 0 2px rgba(109,220,176,.28); }
    .json-editor-host pre.language-json {
      margin: 0;
      min-height: 340px;
      padding: 16px 18px;
      background: transparent !important;
      outline: none;
      white-space: pre-wrap;
      word-break: break-all;
      color: #D0F5E7;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 12px;
      line-height: 1.72;
    }
    .json-editor-host code.language-json {
      display: block;
      outline: none;
      color: #D0F5E7;
      caret-color: var(--mint-300);
    }
    .json-editor-host .token.property { color: #9AE6B4; }
    .json-editor-host .token.string { color: #F6E7A8; }
    .json-editor-host .token.number { color: #A7D8FF; }
    .json-editor-host .token.boolean { color: #FFB4A8; }
    .json-editor-host .token.null { color: #C7B6FF; }
    .json-editor-host .token.punctuation { color: rgba(208,245,231,.62); }

    .hint {
      margin-top: 10px;
      color: var(--text-3);
      font-size: 11px;
    }

    .action-dock {
      grid-column: 1 / -1;
      position: sticky;
      bottom: 8px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-lg);
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      min-height: 40px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -.01em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform .15s, box-shadow .15s, background .15s, color .15s, border-color .15s;
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--sage-500), var(--sage-700));
      box-shadow: 0 10px 22px rgba(54,113,46,.28);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(54,113,46,.36);
    }
    .btn-secondary {
      color: var(--sage-700);
      background: var(--sage-50);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover {
      transform: translateY(-1px);
      border-color: var(--sage-300);
      background: var(--sage-100);
      box-shadow: var(--shadow-sm);
    }

    .status-msg {
      display: none;
      max-width: 520px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
    }
    .status-msg.show { display: block; }
    .status-msg.ok  { background: var(--success-bg); color: var(--success); border-color: rgba(34,168,97,.25); }
    .status-msg.err { background: var(--error-bg);   color: var(--error);   border-color: rgba(229,62,62,.25); }

    /* ===== 窄宽布局 ===== */
    .app[data-layout="narrow"] {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .app[data-layout="narrow"]::before { height: 120px; }
    .app[data-layout="narrow"] .sidebar {
      width: 100%;
      flex: 0 0 auto;
      max-height: 42vh;
    }
    .app[data-layout="narrow"] .sidebar-header { min-height: 122px; }
    .app[data-layout="narrow"] .resizer { display: none; }
    .app[data-layout="narrow"] .main {
      padding: 0 2px 8px;
      overflow: visible;
    }
    .app[data-layout="narrow"] .editor { grid-template-columns: 1fr; }
    .app[data-layout="narrow"] .empty-state { min-height: 340px; }
    @media (max-width: 980px) {
      .editor { grid-template-columns: 1fr; }
      .main { padding-top: 112px; }
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--sage-300);
      background-clip: content-box;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">接口列表</div>
        <div class="header-actions">
          <button class="icon-btn" id="refreshBtn" title="刷新">刷新</button>
          <button class="icon-btn" id="clearBtn" title="清空">清空</button>
        </div>
      </div>
      <div class="request-list" id="requestList">
        <!-- 动态渲染 -->
      </div>
    </aside>

    <div class="resizer" id="resizer"></div>

    <main class="main">
      <div id="content">
        <div class="empty-state">
          <div class="empty-title">暂无接口记录</div>
          <div class="empty-hint">在页面中发送网络请求后会显示在这里</div>
        </div>
      </div>
    </main>
  </div>

  <script src="vendor/prism-core.min.js"></script>
  <script src="vendor/prism-json.min.js"></script>
  <script src="vendor/codejar.min.js"></script>
  <script src="panel.js"></script>
</body>
</html>
