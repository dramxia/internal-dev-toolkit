<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Mock Studio</title>
  <link rel="stylesheet" href="vendor/prism-theme.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

    :root {
      /* ── Core palette (Light Minimalist Theme) ── */
      --bg:           #f8fafc; /* Slate-50 */
      --bg-sidebar:   #ffffff;
      --bg-panel:     #ffffff;
      --bg-hover:     #f1f5f9; /* Slate-100 */
      --bg-active:    #e2e8f0; /* Slate-200 */
      --bg-input:     #ffffff;

      --border:       #e2e8f0; /* Slate-200 */
      --border-focus: #3b82f6; /* Blue-500 */
      --border-subtle:#f1f5f9; /* Slate-100 */

      --text-primary: #0f172a; /* Slate-900 */
      --text-secondary:#475569; /* Slate-600 */
      --text-tertiary: #94a3b8; /* Slate-400 */
      --text-inv:     #ffffff;
      --text-code:    #334155; /* Slate-700 */

      /* ── Method colors (Fresh & Clear) ── */
      --get:          #059669; /* Emerald-600 */
      --get-bg:       #d1fae5; /* Emerald-100 */
      --post:         #2563eb; /* Blue-600 */
      --post-bg:      #dbeafe; /* Blue-100 */
      --put:          #d97706; /* Amber-600 */
      --put-bg:       #fef3c7; /* Amber-100 */
      --delete:       #dc2626; /* Red-600 */
      --delete-bg:    #fee2e2; /* Red-100 */
      --patch:        #7c3aed; /* Violet-600 */
      --patch-bg:     #ede9fe; /* Violet-100 */

      /* ── Semantic ── */
      --success:      #059669;
      --success-bg:   #d1fae5;
      --error:        #dc2626;
      --error-bg:     #fee2e2;
      --warn:         #d97706;
      --warn-bg:      #fef3c7;
      --accent:       #3b82f6;
      --accent-bg:    #dbeafe;

      /* ── Code editor ── */
      --code-bg:      #ffffff;
      --code-gutter:  #f8fafc;
      --code-border:  #e2e8f0;

      /* ── Geometry ── */
      --radius-xs:    4px;
      --radius-sm:    6px;
      --radius-md:    8px;
      --radius-lg:    12px;

      /* ── Shadow ── */
      --shadow-sm:    0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow-md:    0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);

      /* ── Layout ── */
      --sidebar-w:    300px;
      --toolbar-h:    48px;

      /* ── Font ── */
      --font-ui:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono:    'JetBrains Mono', 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ────────────────────────────────────────
       APP SHELL
    ──────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1px 1fr;
      grid-template-rows: var(--toolbar-h) 1fr;
      height: 100vh;
    }

    /* ────────────────────────────────────────
       TOOLBAR
    ──────────────────────────────────────── */
    .toolbar {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      align-items: center;
      height: var(--toolbar-h);
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }
    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 16px;
      flex-shrink: 0;
    }
    .toolbar-brand-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
    }
    .toolbar-brand-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-panel);
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .toolbar-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: #cbd5e1;
    }
    .toolbar-btn:active { transform: translateY(1px); }
    .toolbar-btn svg { flex-shrink: 0; width: 14px; height: 14px; }
    
    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .toolbar-actions[hidden] { display: none; }

    /* ────────────────────────────────────────
       SIDEBAR TABS
    ──────────────────────────────────────── */
    .sidebar-tabs {
      display: flex;
      height: 44px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg-sidebar);
      padding: 0 12px;
    }
    .sidebar-tab {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: var(--text-tertiary);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s ease;
    }
    .sidebar-tab:hover { color: var(--text-primary); }
    .sidebar-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .sidebar-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 9px;
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
      transition: all 0.2s ease;
    }
    .sidebar-tab.active .sidebar-tab-count {
      background: var(--accent-bg);
      color: var(--accent);
    }

    /* ────────────────────────────────────────
       SIDEBAR
    ──────────────────────────────────────── */
    .sidebar {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
      overflow: hidden;
      min-height: 0;
    }
    .request-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
    }

    /* ────────────────────────────────────────
       REQUEST ITEMS
    ──────────────────────────────────────── */
    .request-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      transition: all 0.15s ease;
    }
    .request-item:hover {
      background: var(--bg-hover);
      border-color: var(--border-subtle);
    }
    .request-item.active {
      background: var(--accent-bg);
      border-color: rgba(59, 130, 246, 0.2);
    }
    .request-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .request-method {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 20px;
      padding: 0 6px;
      border-radius: var(--radius-xs);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .method-GET    { color: var(--get);    background: var(--get-bg);    }
    .method-POST   { color: var(--post);   background: var(--post-bg);   }
    .method-PUT    { color: var(--put);    background: var(--put-bg);    }
    .method-DELETE { color: var(--delete); background: var(--delete-bg); }
    .method-PATCH  { color: var(--patch);  background: var(--patch-bg);  }

    .request-url {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-tertiary);
      flex-shrink: 0;
    }
    .status-dot.ok  { background: var(--success); }
    .status-dot.err { background: var(--error); }

    .mocked-tag {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: var(--radius-xs);
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .request-item-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      margin-left: auto;
      border: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-tertiary);
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.15s ease;
    }
    .request-item:hover .request-item-delete { opacity: 0.6; }
    .request-item-delete:hover {
      background: var(--error-bg);
      color: var(--error);
      opacity: 1 !important;
    }

    .list-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1.6;
    }

    /* ────────────────────────────────────────
       RESIZER
    ──────────────────────────────────────── */
    .resizer {
      grid-column: 2;
      grid-row: 2;
      cursor: col-resize;
      background: var(--border);
      position: relative;
      transition: background 0.2s;
    }
    .resizer::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
      z-index: 10;
    }
    .resizer:hover,
    .resizer.dragging {
      background: var(--accent);
    }

    /* ────────────────────────────────────────
       MAIN CONTENT
    ──────────────────────────────────────── */
    .main {
      grid-column: 3;
      grid-row: 2;
      overflow-y: auto;
      background: var(--bg);
      min-width: 0;
    }
    #content { min-height: 100%; display: flex; flex-direction: column; }

    /* ────────────────────────────────────────
       EMPTY STATE (Clean & Minimal)
    ──────────────────────────────────────── */
    .empty-state {
      height: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 32px;
    }
    .empty-state-icon {
      color: #cbd5e1;
      margin-bottom: 20px;
    }
    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-hint {
      font-size: 13px;
      color: var(--text-tertiary);
      text-align: center;
      line-height: 1.6;
    }

    /* ────────────────────────────────────────
       EDITOR LAYOUT
    ──────────────────────────────────────── */
    .editor {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Endpoint header ── */
    .editor-header {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .editor-header-method {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .editor-header-url {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── 可编辑的 Method / URL / Status ── */
    .editor-method-select {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      height: 28px;
      padding: 0 6px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .editor-method-select:focus { border-color: var(--border-focus); }
    .editor-url-input {
      flex: 1;
      min-width: 0;
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .editor-url-input:focus { border-color: var(--border-focus); }
    .editor-status-input {
      width: 64px;
      height: 24px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      outline: none;
      flex-shrink: 0;
      transition: all 0.15s ease;
      -moz-appearance: textfield;
    }
    .editor-status-input::-webkit-outer-spin-button,
    .editor-status-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .editor-status-input:focus { border-color: var(--border-focus); }
    .editor-status-input.ok  { background: var(--success-bg); color: var(--success); }
    .editor-status-input.err { background: var(--error-bg);   color: var(--error); }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 12px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-hover);
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .badge.ok    { background: var(--success-bg); color: var(--success); }
    .badge.err   { background: var(--error-bg);   color: var(--error); }
    .badge.mocked { background: var(--accent-bg); color: var(--accent); }

    /* ── Left config column ── */
    .config-col {
      grid-column: 1;
      grid-row: 2;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Right data column ── */
    .data-col {
      grid-column: 2;
      grid-row: 2;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Action row ── */
    .action-dock {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 20px;
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
    }

    /* ────────────────────────────────────────
       SECTION
    ──────────────────────────────────────── */
    .section {
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      display: flex;
      align-items: center;
      height: 40px;
      padding: 0 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      background: var(--bg-hover);
    }
    .section-body {
      padding: 16px 20px;
    }

    /* ── Key-Value table ── */
    .kv {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .kv-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 12px;
      align-items: start;
    }
    .kv-key {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      padding-top: 2px;
    }
    .kv-val {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      word-break: break-all;
      line-height: 1.6;
    }

    /* ── Intercept toggle ── */
    .intercept-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .intercept-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .switch { display: inline-flex; cursor: pointer; flex-shrink: 0; }
    .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .switch-track {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
      border-radius: 12px;
      background: #e2e8f0;
      transition: background 0.2s;
    }
    .switch-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .switch input:checked + .switch-track {
      background: var(--accent);
    }
    .switch input:checked + .switch-track .switch-thumb {
      transform: translateX(16px);
    }

    /* ── Radio group ── */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 12px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-secondary);
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }
    .radio-label:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .radio-label:has(input:checked) {
      background: var(--accent-bg);
      color: var(--accent);
      border-color: rgba(59, 130, 246, 0.2);
    }
    .radio-label input {
      width: 16px;
      height: 16px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    /* ────────────────────────────────────────
       DATA COLUMN — TABS + EDITOR
    ──────────────────────────────────────── */
    .data-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 16px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      border: none;
    }
    .tab:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .tab.active {
      background: var(--text-primary);
      color: var(--bg);
    }

    /* ── JSON code frame ── */
    .json-frame {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .json-frame.has-lint-error .json-editor-host {
      border: 1px solid var(--error);
    }
    .json-frame-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 16px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .json-frame-title {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .json-editor-host {
      flex: 1;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: stretch;
      overflow: auto;
      background: var(--bg);
      min-height: 200px;
    }
    .json-editor-gutter {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 48px;
      padding: 16px 8px;
      border-right: 1px solid var(--border);
      background: var(--bg-sidebar);
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      user-select: none;
    }
    .json-gutter-line {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 4px;
      height: calc(12px * 1.6);
      align-items: center;
    }
    .json-gutter-line.is-fold-hidden { display: none; }
    .json-fold-btn {
      width: 14px;
      height: 14px;
      padding: 0;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--text-tertiary);
      font-size: 10px;
      line-height: 14px;
      cursor: pointer;
    }
    .json-fold-btn:hover {
      background: var(--border);
      color: var(--text-primary);
    }
    .json-line-no {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .json-code-scroller { min-width: 0; }
    .json-editor-host pre.language-json {
      margin: 0;
      min-height: 200px;
      padding: 16px 20px;
      background: transparent !important;
      outline: none;
      white-space: pre;
      word-break: normal;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-code);
    }
    .json-editor-host code.language-json {
      display: block;
      outline: none;
      caret-color: var(--accent);
    }
    .json-code-line {
      display: block;
      height: calc(12px * 1.6);
      min-height: calc(12px * 1.6);
      overflow: hidden;
      white-space: pre;
    }
    .json-code-line.is-fold-hidden { display: none; }
    .json-code-line.is-fold-start::after {
      content: attr(data-fold-label);
      display: inline-block;
      margin-left: 8px;
      padding: 0 6px;
      border-radius: 3px;
      background: var(--bg-hover);
      color: var(--text-tertiary);
      font-size: 10px;
    }

    /* Prism token colors (Light Theme syntax) */
    .json-editor-host .token.property   { color: #005cc5; }
    .json-editor-host .token.string     { color: #032f62; }
    .json-editor-host .token.number     { color: #005cc5; }
    .json-editor-host .token.boolean    { color: #005cc5; }
    .json-editor-host .token.null       { color: #005cc5; }
    .json-editor-host .token.punctuation { color: #24292e; }

    /* ── Lint status bar ── */
    .json-lint-status {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      border-top: 1px solid var(--border);
      background: var(--bg-sidebar);
      flex-shrink: 0;
    }
    .json-lint-status.ok  { color: var(--success); }
    .json-lint-status.err { color: var(--error); background: var(--error-bg); }

    /* ── Hint line below editor ── */
    .hint {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      background: var(--bg-sidebar);
      flex-shrink: 0;
    }

    /* ────────────────────────────────────────
       MOCK CONTROL — 内嵌操作按钮
    ──────────────────────────────────────── */
    .mock-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }
    .mock-actions .btn {
      justify-content: center;
      width: 100%;
    }
    .mock-actions .status-msg {
      justify-content: center;
      width: 100%;
      height: 32px;
    }

    /* ────────────────────────────────────────
       ACTION DOCK
    ──────────────────────────────────────── */
    .btn-group {
      display: flex;
      gap: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 36px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-panel);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .btn:active:not(:disabled) { transform: translateY(1px); box-shadow: none; }
    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: #cbd5e1;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 1px 2px rgba(59, 130, 246, 0.2);
    }
    .btn-primary:hover {
      background: #2563eb;
    }

    /* ── Status message ── */
    .status-msg {
      display: none;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
    }
    .status-msg.show { display: inline-flex; }
    .status-msg.ok  { background: var(--success-bg); color: var(--success); }
    .status-msg.err { background: var(--error-bg);   color: var(--error); }

    /* ────────────────────────────────────────
       NARROW LAYOUT
    ──────────────────────────────────────── */
    .app[data-layout="narrow"] {
      grid-template-columns: 1fr;
      grid-template-rows: var(--toolbar-h) auto 1fr;
      overflow-y: auto;
      height: auto;
      min-height: 100vh;
    }
    .app[data-layout="narrow"] .sidebar {
      grid-column: 1;
      grid-row: 2;
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .app[data-layout="narrow"] .resizer { display: none; }
    .app[data-layout="narrow"] .main {
      grid-column: 1;
      grid-row: 3;
    }
    .app[data-layout="narrow"] .editor {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      overflow: visible;
      height: auto;
    }
    .app[data-layout="narrow"] .config-col {
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow: visible;
    }
    .app[data-layout="narrow"] .data-col {
      overflow: visible;
    }

    /* ────────────────────────────────────────
       SCROLLBARS
    ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; background-clip: content-box; }

    /* ────────────────────────────────────────
       IMPORT MODAL
    ──────────────────────────────────────── */
    .toolbar-actions-right { margin-left: auto; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(2px);
      animation: modal-fade 0.15s ease;
    }
    .modal-overlay[hidden] { display: none; }
    @keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      width: min(720px, 92vw);
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 40px -8px rgba(0,0,0,0.25);
      overflow: hidden;
      animation: modal-pop 0.18s ease;
    }
    @keyframes modal-pop { from { transform: translateY(8px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .modal-close {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-tertiary);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }

    .modal-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      overflow-y: auto;
    }
    .modal-hint {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .modal-textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .modal-textarea:focus { border-color: var(--border-focus); }
    .modal-textarea::placeholder { color: var(--text-tertiary); }

    .modal-status {
      min-height: 20px;
      font-size: 12px;
      line-height: 1.5;
    }
    .modal-status.err { color: var(--error); }
    .modal-status.ok  { color: var(--success); }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-sidebar);
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-brand">
        <div class="toolbar-brand-icon">M</div>
        <span class="toolbar-brand-name">API Mock Studio</span>
      </div>
      <div class="toolbar-actions" id="toolbarActions">
        <button class="toolbar-btn" id="refreshBtn" title="刷新列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          刷新
        </button>
        <button class="toolbar-btn" id="clearBtn" title="清空当前列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          清空
        </button>
      </div>
      <div class="toolbar-actions toolbar-actions-right" id="toolbarImport">
        <button class="toolbar-btn" id="importBtn" title="从 OpenAPI / Swagger 导入接口至已编">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          导入
        </button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-mode="capture" id="tabCapture">
          捕获<span class="sidebar-tab-count" id="countCapture">0</span>
        </button>
        <button class="sidebar-tab" data-mode="edited" id="tabEdited">
          已编<span class="sidebar-tab-count" id="countEdited">0</span>
        </button>
      </div>
      <div class="request-list" id="requestList">
        <!-- dynamic -->
      </div>
    </aside>

    <!-- Resizer -->
    <div class="resizer" id="resizer"></div>

    <!-- Main -->
    <main class="main">
      <div id="content">
        <!-- 空状态：干净简约的插画和文字 -->
        <div class="empty-state">
          <svg class="empty-state-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            <line x1="10" y1="10" x2="18" y2="10"></line>
            <line x1="10" y1="14" x2="14" y2="14"></line>
          </svg>
          <div class="empty-title">暂无请求记录</div>
          <div class="empty-hint">在页面中发起网络请求<br>捕获后将呈现于此，您可随时修改模拟数据</div>
        </div>
      </div>
    </main>
  </div>

  <!-- 导入 OpenAPI / Swagger 弹窗 -->
  <div class="modal-overlay" id="importModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">导入 OpenAPI / Swagger 接口</span>
        <button class="modal-close" id="importModalClose" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-hint">将 Apifox 中复制的 OpenAPI / Swagger（YAML 或 JSON）粘贴到下方，系统将自动解析接口，并严格按照其数据结构生成 Mock，加入“已编”。</div>
        <textarea class="modal-textarea" id="importTextarea" placeholder="在此粘贴 OpenAPI / Swagger 内容..." spellcheck="false"></textarea>
        <div class="modal-status" id="importStatus"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="importCancelBtn">取消</button>
        <button class="btn btn-primary" id="importConfirmBtn">解析并导入</button>
      </div>
    </div>
  </div>

  <script src="vendor/prism-core.min.js"></script>
  <script src="vendor/prism-json.min.js"></script>
  <script src="vendor/codejar.min.js"></script>
  <script src="vendor/js-yaml.min.js"></script>
  <script src="panel.js"></script>
</body>
</html>
